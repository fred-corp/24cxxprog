name: "FAP: Build and lint"
on: [push, pull_request]
jobs:
  ufbt-build-action:
    runs-on: ubuntu-latest
    name: 'ufbt: Build and lint'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # ── BUILD (runs when commit message contains [build]) ──────────────────
      - name: Build with ufbt
        if: contains(github.event.head_commit.message, '[build]')
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        id: build-app
        with:
          sdk-channel: release
      - name: Upload app artifacts
        if: contains(github.event.head_commit.message, '[build]')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ steps.build-app.outputs.suffix }}
          path: ${{ steps.build-app.outputs.fap-artifacts }}
      # ── LINT / AUTO-FORMAT (runs when commit message contains [lint]) ───────
      - name: Auto-format with clang-format
        if: contains(github.event.head_commit.message, '[lint]')
        run: |
          sudo apt-get install -y --no-install-recommends clang-format
          clang-format -i i2c_24c02.hpp i2c_24c02.cpp i2c_24c02_app.cpp
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add i2c_24c02.hpp i2c_24c02.cpp i2c_24c02_app.cpp
            git commit -m "style: auto clang-format [skip ci]"
            git push
          else
            echo "No formatting changes needed."
          fi